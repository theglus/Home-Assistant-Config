- id: '1644337161806'
  alias: Climate AQI
  description: Turn on Kitchen Dyson when AQI >75.
  trigger:
  - platform: numeric_state
    entity_id: sensor.aqi
    above: '75'
  condition: []
  action:
  - scene: scene.dyson_aqi
  mode: single
- id: '1647740902224'
  alias: Notify Battery
  description: Notify if battery sensors is lower than 25%.
  use_blueprint:
    path: sbyx/low-battery.yaml
    input:
      threshold: 25
      time: 09:00:00
      exclude:
        entity_id:
        - sensor.pixel_5_battery_level
        - sensor.jeffrey_glusman_internal_battery_level
        - sensor.ipad_battery_level
        - sensor.macintoshbook_air_internal_battery_level
        - sensor.browsermod_pixel_browser_battery
        - sensor.mi_magic_cube_battery
        - sensor.lenovo_smart_tab_m8_battery
      actions:
      - data:
          title: '⚠️ Battery:'
          message: Low battery warning for {{sensors|replace("_"," ")}}.
        action: notify.telegram
- id: '1666577570202'
  alias: Peak Usage
  description: ''
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.peak_usage
    to: 'on'
    variables:
      tariff: peak
  - platform: state
    entity_id:
    - binary_sensor.peak_usage
    to: 'off'
    variables:
      tariff: offpeak
  condition: []
  action:
  - service: select.select_option
    target:
      entity_id: select.daily_energy
    data:
      option: '{{ tariff }}'
  - service: select.select_option
    target:
      entity_id: select.monthly_energy
    data:
      option: '{{ tariff }}'
  mode: single
- id: '1666754176988'
  alias: Eco Mode
  description: ''
  trigger:
  - platform: state
    entity_id:
    - media_player.dennis
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 5
  condition: []
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.peak_usage
        state: 'on'
      sequence:
      - delay:
          hours: 0
          minutes: 0
          seconds: 5
          milliseconds: 0
      - service: script.eco_on
        data: {}
    default:
    - delay:
        hours: 0
        minutes: 0
        seconds: 5
        milliseconds: 0
    - service: script.eco_off
      data: {}
  mode: single
- id: '1667587688860'
  alias: Aqara Magic Cube
  description: ''
  use_blueprint:
    path: EdwardTFN/aqara-cube-zha-simplified-face-based-device-control.yaml
    input:
      last_face_input: input_number.magic_cube
      cube: 55278effdc88ebe7ffa36b52540fa006
      face_1_knock:
      - service: script.turn_on
        data: {}
        target:
          entity_id: script.remote_finder
      face_1_rotate_counter_clockwise:
      - service: media_player.volume_down
        data: {}
        target:
          entity_id: media_player.dennis
      face_1_rotate_clockwise:
      - service: media_player.volume_up
        data: {}
        target:
          entity_id: media_player.dennis
      face_2_knock: []
      face_2_rotate_counter_clockwise:
      - service: media_player.media_pause
        data: {}
        target:
          entity_id: media_player.shield_tv
      face_2_rotate_clockwise:
      - service: media_player.media_play
        data: {}
        target:
          entity_id: media_player.shield_tv
      face_4_knock:
      - service: light.toggle
        data: {}
        target:
          entity_id: light.tv
      face_4_rotate_counter_clockwise: []
      face_6_knock:
      - service: switch.toggle
        data: {}
        target:
          entity_id: switch.heat
      face_5_knock:
      - service: script.turn_on
        data: {}
        target:
          entity_id: script.clean_empty
      face_5_rotate_counter_clockwise:
      - service: vacuum.return_to_base
        data: {}
        target:
          entity_id: vacuum.winston
- id: '1667808317967'
  alias: Energy Office
  description: ''
  triggers:
  - at: 07:00:00
    id: fixed-time-7am
    trigger: time
  - at: 00:00:00
    id: fixed-time-12am
    trigger: time
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: fixed-time-7am
      sequence:
      - data: {}
        target:
          entity_id:
          - switch.coffee_station_plug
          - switch.craftstation_plug
          - switch.workstation_plug
        action: switch.turn_on
      - delay:
          hours: 0
          minutes: 1
          seconds: 0
          milliseconds: 0
      - data: {}
        target:
          entity_id: light.pinkie_lamp
        action: light.turn_off
    - conditions:
      - condition: trigger
        id: fixed-time-12am
      sequence:
      - data: {}
        target:
          entity_id:
          - switch.coffee_station_plug
          - switch.craftstation_plug
          - switch.workstation_plug
        action: switch.turn_off
  mode: single
- id: '1684367579757'
  alias: Vacuum API
  description: Disable vacuum camera update when docked
  use_blueprint:
    path: PiotrMachowski/disable_vacuum_camera_update_when_docked.yaml
    input:
      vacuum: vacuum.winston
      camera: camera.xiaomi_cloud_map_extractor
- id: '1687296279667'
  alias: Notify Zigbee
  description: Send Telegram notifications when Zigbee device has gone offline.
  use_blueprint:
    path: Tahutipai/zigbee_zwave_notify_when_battery_devices_have_fallen_offline.yaml
    input:
      actions:
      - data:
          title: '⚠️ Zigbee Network:'
          message: '{{sensors}} has gone offline.'
        action: notify.telegram
      exclude:
        entity_id:
        - sensor.macintoshbook_air_internal_battery_level
        - sensor.ipad_battery_level
        - sensor.pixel_5_battery_level
        - sensor.samsung_flip_battery_level
        - sensor.mi_magic_cube_battery
        - sensor.browsermod_pixel_browser_battery
        - sensor.lenovo_smart_tab_m8_battery
      time: 09:00:00
- id: '1696625276509'
  alias: Reset PowerCal at Startup
  description: ''
  trigger:
  - platform: homeassistant
    event: start
  condition: []
  action:
  - delay:
      hours: 0
      minutes: 0
      seconds: 30
      milliseconds: 0
  - service: homeassistant.update_entity
    data: {}
    target:
      entity_id:
      - sensor.air_purifiers_power
      - sensor.appliance_power
      - sensor.fan_power
      - sensor.grid_power
      - sensor.grid_energy
      - sensor.laundry_power
      - switch.paper_shredder
      - sensor.refrigerator_power
  - service: notify.telegram
    data:
      title: "\U0001F916 Automation Triggered"
      message: Updated PowerCalc appliance entities.
  mode: single
- id: '1709324401353'
  alias: Wake Nest Hub
  description: ''
  use_blueprint:
    path: sbyx/wake-up-light-alarm-with-sunrise-effect.yaml
    input:
      manual_time: 07:00:00
      light_entity: light.tiffanys_lamp
      timestamp_sensor: sensor.loft_nest_hub_alarms
      sunrise_duration: 15
      min_mired: 333
      check_entity: binary_sensor.workday
- id: '1782067918837'
  alias: 'BTN-1 Controls '
  description: ''
  use_blueprint:
    path: ApolloAutomation/BTN-1.yaml
    input:
      button_1_single:
      - action: media_player.media_play_pause
        metadata: {}
        target:
          device_id: 0157cf8135a39223323e875bafb845b5
        data: {}
      device: da850e50245e49fc12c5588c4eaa0676
      button_2_single:
      - action: light.toggle
        metadata: {}
        data: {}
        target:
          entity_id: light.kitchen
      button_3_single:
      - action: light.turn_on
        metadata: {}
        target:
          entity_id: light.btn_1_living_room_btn_3_light
        data:
          rgb_color:
          - 0
          - 255
          - 0
          brightness_pct: 50
      - action: media_player.volume_up
        metadata: {}
        data: {}
        target:
          entity_id: media_player.dennis
      - delay:
          hours: 0
          minutes: 0
          seconds: 1
          milliseconds: 0
      - action: light.turn_off
        metadata: {}
        target:
          entity_id: light.btn_1_living_room_btn_3_light
        data:
          transition: 1
      button_4_single:
      - action: light.turn_on
        metadata: {}
        target:
          entity_id: light.btn_1_living_room_btn_4_light
        data:
          rgb_color:
          - 255
          - 0
          - 0
          brightness_pct: 50
      - action: media_player.volume_down
        metadata: {}
        data: {}
        target:
          entity_id: media_player.dennis
      - delay:
          hours: 0
          minutes: 0
          seconds: 1
          milliseconds: 0
      - action: light.turn_off
        metadata: {}
        target:
          entity_id: light.btn_1_living_room_btn_4_light
        data:
          transition: 1
      button_1_hold:
      - action: script.remote_finder
        metadata: {}
        data: {}
        note: Hold 'button 1' to find remote.
      button_2_double:
      - action: light.toggle
        metadata: {}
        data: {}
        target:
          entity_id: light.group_office
      button_2_triple:
      - action: light.toggle
        metadata: {}
        target:
          entity_id: light.group_hallway
        data: {}
- id: '1782106662390'
  alias: BTN-1 Sleep
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - media_player.shield
    to:
    - 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: TV Off
  - trigger: state
    entity_id:
    - media_player.shield
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: TV On
    from:
    - 'off'
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - TV Off
      sequence:
      - action: switch.turn_off
        metadata: {}
        target:
          entity_id: switch.btn_1_living_room_prevent_sleep
        data: {}
    - conditions:
      - condition: trigger
        id:
        - TV On
      sequence:
      - wait_for_trigger:
        - trigger: state
          entity_id:
          - binary_sensor.btn_1_living_room_online
          to:
          - 'on'
        continue_on_timeout: false
      - action: switch.turn_on
        metadata: {}
        target:
          entity_id: switch.btn_1_living_room_prevent_sleep
        data: {}
  mode: single
- id: '1783049693960'
  alias: Volume Pixel 10 Pro
  triggers:
  - trigger: numeric_state
    entity_id: sensor.pixel_10_pro_volume_level_alarm
    for:
      seconds: 10
    below: 7
    alias: Pixel 10 Pro alarm no longer at max volume
  - trigger: time
    at: '21:00:00'
    alias: Check volume at 9:00 pm
  conditions:
  - condition: time
    after: '21:00:00'
    before: 09:00:00
    alias: Confirm time is after 9:00 PM and before 9:00 am
  actions:
  - action: notify.mobile_app_pixel_10_pro
    data:
      message: command_volume_level
      data:
        media_stream: alarm_stream
        command: 7
    alias: Adjust Pixel 10 Pro alarm to max volume
  mode: single
