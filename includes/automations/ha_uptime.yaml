#################################################################
## HA Uptime
##
## Tracks HA uptime across clean restarts, resetting only on crashes.
#################################################################
- id: 4cf4081d-6ab4-4090-adaa-8de1a0c6816b
  alias: "HA Uptime - Startup"
  description: "On startup, checks clean shutdown flag to preserve uptime across manual restarts or reset it after a crash."
  triggers:
    - trigger: homeassistant
      event: start
      alias: "Home Assistant started"
  actions:
    - alias: "Check for clean shutdown"
      if:
        - condition: state
          entity_id: input_boolean.clean_shutdown
          state: "on"
      then:
        - alias: "Clear clean shutdown flag"
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.clean_shutdown
      else:
        - alias: "Reset accumulated uptime after crash"
          action: input_number.set_value
          target:
            entity_id: input_number.accumulated_uptime_hours
          data:
            value: 0
    - alias: "Record session start time"
      action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ha_session_start
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

- id: fc750e59-baf2-47a8-8b31-c39c824177dd
  alias: "HA Uptime - Shutdown"
  description: "On shutdown, accumulates session uptime and flags a clean shutdown."
  triggers:
    - trigger: homeassistant
      event: shutdown
      alias: "Home Assistant shutting down"
  actions:
    - alias: "Calculate session duration"
      variables:
        session_start: "{{ states('input_datetime.ha_session_start') }}"
        elapsed: >-
          {% if session_start not in ['unknown', 'unavailable'] %}
            {{ (now() - session_start | as_datetime | as_local).total_seconds() / 86400 }}
          {% else %}
            0
          {% endif %}
    - alias: "Add session to accumulated uptime"
      action: input_number.set_value
      target:
        entity_id: input_number.accumulated_uptime_hours
      data:
        value: "{{ (states('input_number.accumulated_uptime_hours') | float(0) + elapsed | float(0)) | round(4) }}"
    - alias: "Flag clean shutdown"
      action: input_boolean.turn_on
      target:
        entity_id: input_boolean.clean_shutdown
