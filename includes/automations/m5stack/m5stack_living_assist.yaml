#################################################################
## M5Stack Living Room Assist
#
## Toggle Yumi lamp color when M5Stack Living Room starts/stops listening.
#################################################################
id: "1707166774937"
alias: M5 Living Assist
description: "Toggle Yumi lamp color when M5Stack Living Room starts/stops listening."
triggers:
  - alias: M5Stack Living Room starts listening
    trigger: state
    entity_id:
      - assist_satellite.m5stack_living_room_assist_in_progress
    to: listening
    id: listening
  - alias: M5Stack Living Room stops listening
    trigger: state
    entity_id:
      - assist_satellite.m5stack_living_room_assist_in_progress
    to: idle
    id: idle
conditions: []
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: listening
        sequence:
          - metadata: {}
            data:
              snapshot_entities:
                - light.yumi_lamp
              scene_id: yumi_state
            alias: Scene 'Create' snapshot yumi_state
            action: scene.create
          - alias: Change Yumi Light to Blue
            metadata: {}
            data:
              color_name: blue
            target:
              entity_id: light.yumi_lamp
            action: light.turn_on
      - conditions:
          - condition: trigger
            id: idle
        sequence:
          - target:
              entity_id: light.yumi_lamp
            data:
              color_temp: 370
            alias: Return Yumi Light to 370 color temp
            action: light.turn_on
          - metadata: {}
            target:
              entity_id: scene.yumi_state
            action: scene.turn_on
            data: {}
mode: single
