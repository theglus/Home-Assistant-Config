#################################################################
## Notify Heat Wave
#
## Notify smartphones when tomorrows high is  >75 °F.
#################################################################
id: cc68ebb7-5c43-4760-848a-4af98e36eaf3
alias: "Notify Heat Wave"
description: Notify smartphones when tomorrows high is  >75 °F.
trigger:
  - platform: time
    at: "22:00:00"
action:
  - service: weather.get_forecasts
    target:
      entity_id: weather.climacell_daily
    data:
      type: daily
    response_variable: forecast_data
  - condition: template
    value_template: "{{ forecast_data['weather.climacell_daily'].forecast[1].temperature | float(0) > 75 }}"
  - service: notify.smartphones
    data:
      title: 🥵 Heat Wave
      message: >-
        Tomorrow's high is
        {{ forecast_data['weather.climacell_daily'].forecast[1].temperature }} °F.
  - wait_for_trigger:
      - platform: time
        at: "07:00:00"
  - service: weather.get_forecasts
    target:
      entity_id: weather.climacell_daily
    data:
      type: daily
    response_variable: forecast_morning
  - service: notify.smartphones
    data:
      title: 🥵 Heat Wave
      message: >-
        Today's high is
        {{ forecast_morning['weather.climacell_daily'].forecast[0].temperature }} °F.
mode: single
