#################################################################
## Notify Heat Wave
#
## Notify smartphones when tomorrows high is  >75 °F.
#################################################################
id: cc68ebb7-5c43-4760-848a-4af98e36eaf3
alias: "Notify Heat Wave"
description: Notify smartphones when tomorrows high is  >75 °F.
trigger:
  - platform: time
    at: "22:00:00"
condition:
  - condition: numeric_state
    entity_id: weather.climacell_daily
    attribute: forecast[1].temperature
    above: "75"
action:
  - service: notify.smartphones
    data:
      title: 🥵 Heat Wave
      message: >-
        Tomorrow's high is
        {{states.weather.climacell_daily.attributes.forecast[1].temperature}}
        °F.
  - wait_for_trigger:
      - platform: time
        at: "07:00:00"
  - service: notify.smartphones
    data:
      title: 🥵 Heat Wave
      message: >-
        Today's high is
        {{states.weather.climacell_daily.attributes.forecast[1].temperature}} °F.
mode: single
