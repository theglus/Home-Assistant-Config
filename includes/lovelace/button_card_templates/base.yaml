#################################################################
## Base Button Properties
#################################################################
aspect_ratio: 1/1
show_state: true
show_icon: false
variables:
  state: >
    [[[ return entity === undefined || entity.state; ]]]
  timeout: >
    [[[ return entity === undefined || Date.now() - Date.parse(entity.last_changed); ]]]
  light_color: >
    [[[ return entity === undefined ? 'var(--state-icon-color)' : 'var(--button-card-light-color-no-temperature)'; ]]]
state:
  - value: "on"
    styles:
      card: [background-color: "var(--bc-card-bg-on)"]
      name: [color: "var(--bc-text-on)"]
      state: [color: "var(--bc-text-on)"]
  - value: "playing"
    styles:
      card: [background-color: "var(--bc-card-bg-on)"]
      name: [color: "var(--bc-text-on)"]
      state: [color: "var(--bc-text-on)"]
  - value: "idle"
    styles:
      card: [background-color: "var(--bc-card-bg-on)"]
      name: [color: "var(--bc-text-on)"]
      state: [color: "var(--bc-text-on)"]
  - value: "cool"
    styles:
      card: [background-color: "var(--bc-card-bg-on)"]
      name: [color: "var(--bc-text-on)"]
      state: [color: "var(--bc-text-on)"]
  - value: "auto"
    styles:
      card: [background-color: "var(--bc-card-bg-on)"]
      name: [color: "var(--bc-text-on)"]
      state: [color: "var(--bc-text-on)"]
tap_action:
  action: toggle
  haptic: light
hold_action:
  action: none
double_tap_action:
  haptic: selection
styles:
  grid:
    - grid-template-areas: |
        "icon  circle"
        "n     n"
        "s     s"
    - grid-template-columns: repeat(2, 1fr)
    - grid-template-rows: auto repeat(2, min-content)
    - gap: 2%
    - align-items: start
  name:
    - justify-self: start
    - line-height: 115%
  state:
    - justify-self: start
    - line-height: 115%
  card:
    - font-family: "var(--bc-font-family)"
    - border-radius: "var(--bc-border-radius)"
    - border-style: none
    - font-size: "var(--bc-font-size)"
    - box-shadow: none
    - transition: none
    - padding: 10%
    - background-color: "var(--bc-card-bg)"
    - color: "var(--bc-text-dim)"
    - letter-spacing: "var(--bc-letter-spacing)"
