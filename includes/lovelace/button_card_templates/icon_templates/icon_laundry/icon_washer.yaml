#################################################################
## Washer Icon
#################################################################
template:
  - base
  - circle_laundry
state_display: >
  [[[
    const active = variables.state !== 'off' && variables.state !== 'unavailable';
    if (!active) return variables.state === 'off' ? 'Off' : '';
    const phase = entity.attributes.run_state;
    if (!phase || phase === '-' || phase === 'unknown') return '';
    return phase;
  ]]]
tap_action:
  action: failure
double_tap_action:
  action: more-info
styles:
  custom_fields:
    icon:
      - top: 7%
      - left: 4%
      - width: 78%
      - position: absolute
custom_fields:
  icon: >
    [[[
      const active = variables.state !== 'off' && variables.state !== 'unavailable';
      const baseColor = active ? 'rgba(0,0,0,0.5)' : '#ffffff';
      const tumbleColor = active ? '#6B9BE0' : '#ffffff';
      const spinAnim = active ? '<animateTransform attributeName="transform" type="rotate" from="0 12 14" to="360 12 14" dur="2s" repeatCount="indefinite"/>' : '';
      return `
        <svg viewBox="0 0 50 50">
          <path fill="${baseColor}" d="M6,2H18A2,2 0 0,1 20,4V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V4A2,2 0 0,1 6,2M7,4A1,1 0 0,0 6,5A1,1 0 0,0 7,6A1,1 0 0,0 8,5A1,1 0 0,0 7,4M10,4A1,1 0 0,0 9,5A1,1 0 0,0 10,6A1,1 0 0,0 11,5A1,1 0 0,0 10,4M12,8A6,6 0 0,0 6,14A6,6 0 0,0 12,20A6,6 0 0,0 18,14A6,6 0 0,0 12,8Z"/>
          <g>
            <path fill="${tumbleColor}" d="M14.83,11.17C16.39,12.73 16.39,15.27 14.83,16.83C13.27,18.39 10.73,18.39 9.17,16.83L14.83,11.17"/>
            ${spinAnim}
          </g>
        </svg>
      `;
    ]]]
