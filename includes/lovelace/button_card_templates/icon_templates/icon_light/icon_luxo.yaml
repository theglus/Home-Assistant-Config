#################################################################
## Luxo Lamp Icon
#
## Pixar-style desk lamp that perks up when on and droops when off.
#################################################################
template:
  - light
styles:
  custom_fields:
    icon:
      - width: 75%
      - margin-left: -8%
      - margin-top: 3%
custom_fields:
  icon: >
    [[[
      let state;
      if (variables.state === 'on' && variables.timeout < 2000) {
        state = 'on';
      }
      if (variables.state === 'off' && variables.timeout < 2000) {
        state = 'off';
      }
      if (variables.state === 'on' && variables.timeout > 2000) {
        state = 'on_timeout';
      }
      return `
        <svg viewBox="0 0 50 50">
          <style>
            @keyframes on {
              0% {
                transform: rotateZ(0deg);
                animation-timing-function: cubic-bezier(0.7, 0, 0.84, 0);
              }
              70% {
                transform: rotateZ(-15deg);
                animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
              }
              75% {
                transform: rotateZ(-15deg);
                animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
              }
              88% {
                transform: rotateZ(-11deg);
              }
              100% {
                transform: rotateZ(-15deg);
              }
            }
            @keyframes off {
              0% {
                transform: rotateZ(-15deg);
                animation-timing-function: cubic-bezier(0.7, 0, 0.84, 0);
              }
              70% {
                transform: rotateZ(0deg);
                animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
              }
              75% {
                transform: rotateZ(0deg);
                animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
              }
              88% {
                transform: rotateZ(-4deg);
              }
              100% {
                transform: rotateZ(0deg);
              }
            }
            .on {
              animation: on 0.7s;
              transform-origin: 52% 88%;
              animation-fill-mode: forwards;
              animation-delay: -0.1s;
            }
            .off {
              animation: off 0.7s;
              transform-origin: 52% 88%;
              animation-fill-mode: forwards;
            }
            .on_timeout {
              transform: rotateZ(-15deg);
              transform-origin: 52% 88%;
            }
          </style>
          <rect fill="#9da0a2" x="13" y="44" width="26" height="4" rx="2"/>
          <g class="${state}">
            <path fill="#9da0a2" d="M27 44 L25 45 L19 31 L21 30 Z"/>
            <circle fill="#9da0a2" cx="20" cy="30" r="2.5"/>
            <path fill="#9da0a2" d="M19 29 L21 31 L33 17 L31 15 Z"/>
            <circle fill="#9da0a2" cx="32" cy="16" r="2"/>
            <path fill="#9da0a2" d="M32 16 L22 26 Q31 34 40 23 Z"/>
            <path fill="${variables.light_color}" d="M32 16 L23 25 Q31 32 39 24 Z"/>
          </g>
        </svg>
      `;
    ]]]
