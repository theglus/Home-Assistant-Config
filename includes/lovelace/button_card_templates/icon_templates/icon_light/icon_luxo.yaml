#################################################################
## Luxo Lamp Icon
#
## Pixar-style desk lamp that perks up when on and droops when off.
#################################################################
template:
  - light
styles:
  custom_fields:
    icon:
      - width: 85%
      - margin-left: -12%
      - margin-top: -2%
custom_fields:
  icon: >
    [[[
      let state;
      if (variables.state === 'on' && variables.timeout < 2000) {
        state = 'on';
      }
      if (variables.state === 'off' && variables.timeout < 2000) {
        state = 'off';
      }
      if (variables.state === 'on' && variables.timeout > 2000) {
        state = 'on_timeout';
      }
      return `
        <svg viewBox="0 0 50 50">
          <style>
            @keyframes on {
              0% {
                transform: rotateZ(0deg);
                animation-timing-function: cubic-bezier(0.7, 0, 0.84, 0);
              }
              70% {
                transform: rotateZ(-15deg);
                animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
              }
              75% {
                transform: rotateZ(-15deg);
                animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
              }
              88% {
                transform: rotateZ(-11deg);
              }
              100% {
                transform: rotateZ(-15deg);
              }
            }
            @keyframes off {
              0% {
                transform: rotateZ(-15deg);
                animation-timing-function: cubic-bezier(0.7, 0, 0.84, 0);
              }
              70% {
                transform: rotateZ(0deg);
                animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
              }
              75% {
                transform: rotateZ(0deg);
                animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
              }
              88% {
                transform: rotateZ(-4deg);
              }
              100% {
                transform: rotateZ(0deg);
              }
            }
            .on {
              animation: on 0.7s;
              transform-origin: 50% 92%;
              animation-fill-mode: forwards;
              animation-delay: -0.1s;
            }
            .off {
              animation: off 0.7s;
              transform-origin: 50% 92%;
              animation-fill-mode: forwards;
            }
            .on_timeout {
              transform: rotateZ(-15deg);
              transform-origin: 50% 92%;
            }
          </style>
          <rect fill="#9da0a2" x="11" y="44" width="28" height="4" rx="2"/>
          <g class="${state}">
            <path fill="#9da0a2" d="M26 43 L24 45 L15 23 L17 21 Z"/>
            <circle fill="#9da0a2" cx="16" cy="22" r="3"/>
            <path fill="#9da0a2" d="M15 21 L17 23 L39 7 L37 5 Z"/>
            <circle fill="#9da0a2" cx="38" cy="6" r="2.5"/>
            <path fill="#9da0a2" d="M38 6 L22 20 Q34 30 46 16 Z"/>
            <path fill="${variables.light_color}" d="M38 6 L24 19 Q34 28 44 17 Z"/>
          </g>
        </svg>
      `;
    ]]]
