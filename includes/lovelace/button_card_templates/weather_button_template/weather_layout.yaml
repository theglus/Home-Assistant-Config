#################################################################
## Weather Button Layout
#################################################################
  aspect_ratio: 1/1
  size: 70%
  styles:
    card:
      [
        font-family: "var(--bc-font-family)",
        letter-spacing: "var(--bc-letter-spacing)",
        font-weight: "var(--bc-font-weight)",
        color: "var(--bc-text-dim)",
        font-size: "var(--bc-font-size)",
        background-color: "var(--bc-card-bg)",
        border-radius: "var(--bc-border-radius)",
        border-style: none,
        box-shadow: none,
        transition: none,
      ]
    custom_fields:
      s2:
        - justify-self: start
        - margin-left: 10%
        - padding-bottom: 5%
        - font-size: 10pt
        - color: white
    grid:
      - grid-template-areas: '"i l" "s s" "n n" "s2 s2"'
      - grid-template-columns: 1fr 1fr
      - grid-template-rows: 1fr auto auto auto
    icon:
      - color: white
    label:
      - justify-self: start
      - color: white
    name:
      - justify-self: start
      - margin-left: 10%
      - font-size: 10pt
      - color: white
    state:
      - justify-self: start
      - margin-left: 10%
      - font-weight: bold
      - color: white
