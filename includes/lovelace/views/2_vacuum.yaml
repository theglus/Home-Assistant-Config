title: Winston
path: winston
icon: "mdi:robot-vacuum-variant"
panel: false
badges:
  - type: entity
    entity: vacuum.winston
    color: orange
    state_color: false
  - type: entity
    entity: sensor.winston_last_clean_end
    name: Last Clean
    color: orange
    state_color: false
cards:
  - type: vertical-stack
    cards:
      - type: entities
        style: |
          ha-card {
            border-radius: 30px;
            border-style: none;
            background: rgba(0,0,0,.3);
            box-shadow: none;
            }
        #################################################################
        #----------------------------------------------------------------
        ## Toggle Nav
        #----------------------------------------------------------------
        #################################################################
        entities:
          - type: "custom:paper-buttons-row"
            buttons:
              #################################################################
              ## Map Button
              #################################################################
              - entity: input_select.vacuum_toggle
                name: false
                icon: "mdi:floor-plan"
                state_styles:
                  Map:
                    template: nav_button
                template: nav_styles
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.vacuum_toggle
                    option: Map
              #################################################################
              ## Controls Button
              #################################################################
              - entity: input_select.vacuum_toggle
                name: false
                icon: "mdi:robot-vacuum-variant"
                state_styles:
                  Controls:
                    template: nav_button
                template: nav_styles
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.vacuum_toggle
                    option: Controls
      #################################################################
      #----------------------------------------------------------------
      ## Expanded
      #----------------------------------------------------------------
      #################################################################
      - type: "custom:state-switch"
        entity: input_select.vacuum_toggle
        default: Map
        transition: none
        states:
          #################################################################
          ## Map
          #################################################################
          Map:
            type: "custom:mod-card"
            style: |
              ha-card {
                background: rgba(0,0,0,.3);
                padding: 10px;
                border-radius: 35px;
                border-style: none;
                margin-top: none;
                }
            card:
              type: vertical-stack
              cards:
                - type: entities
                  title: Vacuum
                  card_mod:
                    class: header
                    style: |
                      .card-header {
                        font-family: SF Text;
                        letter-spacing: 0.005em;
                        font-size: 1.6em;
                        font-weight: 500;
                        line-height: initial;
                        padding: 0.75em 0em 0.5em 1.1em;
                        cursor: default;
                        border-style: none;
                      }
                      ha-card {
                        border-style: none;
                        background: none;
                      }
                  entities: []
                - type: custom:xiaomi-vacuum-map-card
                  card_mod:
                    style: |
                      ha-card {
                        --map-card-primary-color: #FFFFFF10;
                        --map-card-secondary-color: none;
                        --map-card-secondary-text-color: #9da0a2;
                        --map-card-zoomer-background: none;
                        --map-card-big-radius: 0.6em;
                        --map-card-small-radius: 0.6em;
                        --map-card-room-outline-line-color: transparent;
                        --map-card-room-outline-fill-color: transparent;
                        --map-card-room-outline-line-color-selected: rgba(255, 255, 255, 0.5);
                        --map-card-room-outline-fill-color-selected: rgba(42, 124, 194, 0.1);
                        --map-card-room-icon-background-color-selected: rgb(42, 124, 194);
                        border: none;
                        background: none;
                      }
                      ha-card $ div.controls-wrapper {
                        padding: 0;
                        letter-spacing: normal;
                      }
                      ha-card $ xvmc-tiles-wrapper,
                      ha-card $ #map-zoomer-overlay {
                        display: none;
                      }
                      ha-card $ div.map-controls-wrapper {
                        padding: 0.5em 1.5em 0.3em 1.5em;
                        justify-content: space-between;
                      }
                      ha-card $ div.vacuum-controls {
                        justify-content: space-evenly;
                        padding: 0.3em 2em 1em 2em;
                      }
                      ha-card $ paper-button.map-actions-item.main {
                        border-radius: 0.6em;
                      }
                      ha-card $ paper-button {
                        --mdc-icon-size: 2em;
                        color: #9da0a2 !important;
                        padding: 0.5em 0.75em;
                      }
                  entity: vacuum.winston
                  map_source:
                    camera: image.winston_live_map
                  calibration_source:
                    camera: true
                  map_locked: true
                  map_modes:
                    - template: vacuum_clean_segment
                      predefined_selections:
                        # Hallway - 18
                        - id: 18
                          icon:
                            name: mdi:coat-rack
                            x: 23775
                            y: 24950
                        # Living Room - 19
                        - id: 19
                          icon:
                            name: mdi:sofa
                            x: 29275
                            y: 24650
                        # Kitchen - 20
                        - id: 20
                          icon:
                            name: mdi:fridge
                            x: 29150
                            y: 21975
                        # Office - 17
                        - id: 17
                          icon:
                            name: mdi:desk
                            x: 25275
                            y: 22325
                        # Bathroom - 16
                        - id: 16
                          icon:
                            name: mdi:washing-machine
                            x: 22200
                            y: 22700
                    - template: vacuum_clean_zone
          #################################################################
          ## Controls
          #################################################################
          Controls:
            type: "custom:mod-card"
            style: |
              ha-card {
                background: rgba(0,0,0,.3);
                padding: 10px;
                border-radius: 35px;
                border-style: none;
                margin-top: none;
                }
            card:
              type: entities
              title: Overview
              card_mod:
                class: header
                style: |
                  .card-header {
                    font-family: SF Text;
                    letter-spacing: 0.005em;
                    font-size: 1.6em;
                    font-weight: 500;
                    line-height: initial;
                    padding: 0.75em 0em 1em 1.1em;
                    cursor: default;
                    border-style: none;
                  }
                  ha-card {
                    padding-right: 0.75em;
                    border-style: none;
                    background: none;
                  }
                  ha-card $ #states > *:last-child {
                    padding-top: 0.75em;
                  }
                  ha-card $ hui-horizontal-stack-card {
                    justify-content: space-between;
                  }
              entities:
                - type: custom:bar-card
                  width: 55%
                  height: 2em
                  decimal: 0
                  unit_of_measurement: "%"
                  positions:
                    icon: outside
                    indicator: "off"
                    name: outside
                  severity:
                    - color: "#303435"
                      from: 11
                      to: 10000
                    - color: "#6d2525"
                      from: -10000
                      to: 10
                  entity_row: true
                  style: |
                    ha-card {
                      border-style: none;
                    }
                    bar-card-value {
                      font-size: 1em;
                      font-weight: 400;
                      color: #e0e1e1;
                      letter-spacing: 0.01em;
                      text-shadow: none;
                      margin-right: auto;
                      margin-left: auto;
                      margin-top: 5px;
                    }
                    bar-card-name {
                      padding-left: 0.25em;
                    }
                    bar-card-iconbar {
                      padding-left: 0.23em;
                    }
                    bar-card-backgroundbar {
                      background: none;
                    }
                    bar-card-currentbar {
                      border-radius: 0.3em;
                    }
                    bar-card-background {
                      background: radial-gradient(circle, rgba(52, 57, 58, 0.1) 0%, rgba(17, 18, 18, 0.2) 75%);
                      box-shadow: inset 0 0 25px #00000045;
                      border-radius: 0.3em;
                      overflow: hidden;
                    }
                  entities:
                    - entity: vacuum.winston
                      attribute: battery_level
                      name: Battery
                      icon: mdi:battery

                    - entity: sensor.vacuum_filter
                      name: Filter
                      icon: custom:vacuum-filter

                    - entity: sensor.vacuum_mainbrush
                      name: Main Brush
                      icon: custom:vacuum-mainbrush

                    - entity: sensor.vacuum_sidebrush
                      name: Side Brush
                      icon: custom:vacuum-sidebrush

                    - entity: sensor.vacuum_sensors
                      name: Sensors
                      icon: custom:vacuum-sensor

                - type: custom:hui-element
                  card_type: horizontal-stack
                  cards:
                    #----------------------------------------------------------------
                    ## Reset Filter
                    #----------------------------------------------------------------
                    - type: custom:button-card
                      entity: button.winston_reset_filter
                      tap_action:
                        action: none
                      double_tap_action:
                        action: none
                      hold_action:
                        action: call-service
                        service: button.press
                        service_data:
                          entity_id: button.winston_reset_filter
                      template: icon_only
                    #----------------------------------------------------------------
                    ## Reset Main Brush
                    #----------------------------------------------------------------
                    - type: custom:button-card
                      entity: button.winston_reset_main_brush
                      tap_action:
                        action: none
                      double_tap_action:
                        action: none
                      hold_action:
                        action: call-service
                        service: button.press
                        service_data:
                          entity_id: button.winston_reset_main_brush
                      template: icon_only
                    #----------------------------------------------------------------
                    ## Reset Side Brush
                    #----------------------------------------------------------------
                    - type: custom:button-card
                      entity: button.winston_reset_side_brush
                      tap_action:
                        action: none
                      double_tap_action:
                        action: none
                      hold_action:
                        action: call-service
                        service: button.press
                        service_data:
                          entity_id: button.winston_reset_side_brush
                      template: icon_only
                    #----------------------------------------------------------------
                    ## Reset Sensors
                    #----------------------------------------------------------------
                    - type: custom:button-card
                      entity: button.winston_reset_sensor_dirty
                      tap_action:
                        action: none
                      double_tap_action:
                        action: none
                      hold_action:
                        action: call-service
                        service: button.press
                        service_data:
                          entity_id: button.winston_reset_sensor_dirty
                      template: icon_only
                    #----------------------------------------------------------------
                    ## Empty
                    #----------------------------------------------------------------
                    - type: custom:button-card
                      icon: mdi:delete-empty
                      tap_action:
                        action: call-service
                        service: vacuum.send_command
                        service_data:
                          entity_id: vacuum.winston
                          command: app_goto_target
                          params: [30750, 22150]
                      template: icon_only
