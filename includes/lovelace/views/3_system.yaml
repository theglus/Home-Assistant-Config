title: ha
path: ha
panel: false
icon: "mdi:home-assistant"
badges:
  - entity: binary_sensor.cloudflare_dns
    name: "1.1.1.1"
    show_name: true
    show_state: false
    tap_action:
      action: url
      url_path: "https://www.cloudflarestatus.com/"
  - entity: binary_sensor.internet_status
    tap_action:
      action: url
      url_path: "https://gfiber.com/webpass/support/"
  - entity: binary_sensor.google_dns
    name: "8.8.8.8"
    show_name: true
    show_state: false
    tap_action:
      action: url
      url_path: "https://status.cloud.google.com/"
cards:
  - type: vertical-stack
    cards:
      - type: entities
        style: |
          ha-card {
            border-radius: 30px;
            border-style: none;
            background: rgba(0,0,0,.3);
            box-shadow: none;
            }
        #################################################################
        #----------------------------------------------------------------
        ## Toggle Nav
        #----------------------------------------------------------------
        #################################################################
        entities:
          - type: "custom:paper-buttons-row"
            buttons:
              #################################################################
              ## Home Assistant Button
              #################################################################
              - entity: input_select.systemtoggle
                name: false
                icon: "mdi:home-assistant"
                state_styles:
                  Home Assistant:
                    template: nav_button
                template: nav_styles
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.systemtoggle
                    option: Home Assistant
              #################################################################
              ## Nibbler Button
              #################################################################
              - entity: input_select.systemtoggle
                name: false
                icon: "mdi:harddisk"
                state_styles:
                  Nibbler:
                    template: nav_button
                template: nav_styles
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.systemtoggle
                    option: Nibbler
              #################################################################
              ## Leela Button
              #################################################################
              - entity: input_select.systemtoggle
                name: false
                icon: "mdi:server"
                state_styles:
                  Leela:
                    template: nav_button
                template: nav_styles
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.systemtoggle
                    option: Leela
              #################################################################
              ## Desktop Button
              #################################################################
              - entity: input_select.systemtoggle
                name: false
                icon: "mdi:desktop-tower"
                state_styles:
                  Desktop:
                    template: nav_button
                template: nav_styles
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.systemtoggle
                    option: Desktop
              #################################################################
              ## Claude Button
              #################################################################
              - entity: input_select.systemtoggle
                name: false
                icon: "mdi:chart-areaspline"
                state_styles:
                  Claude:
                    template: nav_button
                template: nav_styles
                tap_action:
                  action: call-service
                  service: input_select.select_option
                  service_data:
                    entity_id: input_select.systemtoggle
                    option: Claude
      #################################################################
      #----------------------------------------------------------------
      ## Expanded
      #----------------------------------------------------------------
      #################################################################
      - type: "custom:state-switch"
        entity: input_select.systemtoggle
        default: Home Assistant
        transition: none
        states:
          #################################################################
          ## Home Assistant Controls
          #################################################################
          Home Assistant:
            type: "custom:mod-card"
            style: &mod_card_style |
              ha-card {
                background: rgba(0,0,0,.3);
                padding: 10px;
                border-radius: 35px;
                border-style: none;
                margin-top: none;
                }
            card:
              type: grid
              columns: 1
              square: false
              cards:
                - type: entities
                  title: Home Assistant
                  card_mod: &entities_card_mod
                    style: |
                      ha-card {
                        border-style: none;
                        background: none;
                        --bar-card-border-radius: 8px;
                      }
                  entities:
                    - entity: binary_sensor.home_assistant_major_update
                      name: Installed Version
                      icon: mdi:home-assistant
                    # - entity: sensor.hacs
                    - entity: sensor.time_online
                    #----------------------------------------------------------------
                    ## Containers Bar
                    #----------------------------------------------------------------
                    - type: section
                      label: Containers
                      card_mod:
                        style: |
                          :host {
                            display: flex !important;
                            flex-direction: row !important;
                            align-items: center !important;
                            gap: 8px !important;
                          }
                          .label {
                            color: var(--bc-text-dim) !important;
                            white-space: nowrap;
                            flex-shrink: 0;
                            margin: 0 !important;
                            order: -1 !important;
                          }
                          .divider {
                            flex: 1 !important;
                            background-color: var(--bc-text-dim) !important;
                            height: 1px !important;
                            margin: 0 !important;
                          }
                          hr {
                            display: none !important;
                          }
                    - type: custom:button-card
                      entity: binary_sensor.tailscale_running
                      name: Tailscale
                      icon: mdi:shield-lock
                      show_icon: true
                      show_name: true
                      show_state: false
                      show_label: true
                      size: 24px
                      color: "#9da0a2"
                      label: >-
                        [[[ return entity.state === 'on' ? 'Connected' : 'Disconnected' ]]]
                      tap_action:
                        action: call-service
                        service: switch.toggle
                        service_data:
                          entity_id: switch.tailscale
                      styles:
                        grid:
                          - grid-template-areas: '"i n l"'
                          - grid-template-columns: 40px 1fr auto
                          - align-items: center
                        card:
                          - background: transparent
                          - box-shadow: none
                          - border-radius: 0
                          - padding: 0
                          - height: 52px
                          - font-size: inherit
                          - --mdc-ripple-color: transparent
                          - --ha-card-hover-opacity: "0"
                        icon:
                          - align-self: center
                          - justify-self: center
                          - padding: 0
                          - width: 24px
                          - height: 24px
                        name:
                          - font-size: 1em
                          - font-weight: 400
                          - justify-self: start
                          - align-self: center
                          - padding-left: 16px
                          - color: var(--primary-text-color)
                        label:
                          - background: >-
                              [[[ return entity.state === 'on' ? 'rgba(67, 160, 71, 0.5)' : 'rgba(255,255,255,0.15)' ]]]
                          - color: white
                          - border-radius: 12px
                          - padding: 4px 14px
                          - font-size: 0.9em
                          - font-weight: 500
                          - align-self: center
                      card_mod:
                        style: |
                          ha-card {
                            --ha-card-hover-opacity: 0 !important;
                          }
                          ha-ripple {
                            display: none !important;
                          }
                    - type: custom:bar-card
                      width: 55%
                      height: 2.5em
                      decimal: 0
                      unit_of_measurement: "%"
                      positions:
                        icon: outside
                        indicator: "off"
                        name: outside
                        value: inside
                      max: 100
                      severity:
                        - color: "#303435"
                          from: 0
                          to: 75
                        - color: "#6d2525"
                          from: 75
                          to: 100
                      entity_row: true
                      style: |
                        ha-card {
                          border-style: none;
                        }
                        bar-card-value {
                          font-size: 1em;
                          font-weight: 400;
                          color: #e0e1e1;
                          letter-spacing: 0.01em;
                          text-shadow: none;
                          margin-right: auto;
                          margin-left: auto;
                          margin-top: 5px;
                        }
                        bar-card-name {
                          margin-left: 0 !important;
                        }
                        bar-card-iconbar {
                          padding-left: 0.23em;
                        }
                        bar-card-backgroundbar {
                          background: none;
                        }
                        bar-card-currentbar {
                          border-radius: 0.3em;
                        }
                        bar-card-background {
                          background: radial-gradient(circle, rgba(52, 57, 58, 0.1) 0%, rgba(17, 18, 18, 0.2) 75%);
                          box-shadow: inset 0 0 25px #00000045;
                          border-radius: 0.3em;
                          overflow: hidden;
                        }
                      entities:
                        - entity: sensor.studio_code_server_memory_percent
                          name: Studio Code
                          icon: mdi:microsoft-visual-studio-code
                          tap_action:
                            action: navigate
                            navigation_path: /config/app/a0d7b954_vscode/info
                          hold_action:
                            action: call-service
                            service: script.turn_on
                            service_data:
                              entity_id: script.vscode_reload
                            confirmation: true
                    - type: section
                      label: System
                      card_mod:
                        style: |
                          :host {
                            display: flex !important;
                            flex-direction: row !important;
                            align-items: center !important;
                            gap: 8px !important;
                          }
                          .label {
                            color: var(--bc-text-dim) !important;
                            white-space: nowrap;
                            flex-shrink: 0;
                            margin: 0 !important;
                            order: -1 !important;
                          }
                          .divider {
                            flex: 1 !important;
                            background-color: var(--bc-text-dim) !important;
                            height: 1px !important;
                            margin: 0 !important;
                          }
                          hr {
                            display: none !important;
                          }
                    - type: custom:hui-horizontal-stack-card
                      cards:
                        #----------------------------------------------------------------
                        ## HA CPU Utilization Graph
                        #----------------------------------------------------------------
                        - type: "custom:decluttering-card"
                          template: declutter_system_graph
                          variables:
                            - sensor: sensor.processor_use_percent
                            - name: CPU
                            - server: Farnsworth
                            - title: CPU Utilization
                            - green: 25
                            - yellow: 50
                            - orange: 75
                            - red: 100
                        #----------------------------------------------------------------
                        ## HA Memory Utilization Graph
                        #----------------------------------------------------------------
                        - type: "custom:decluttering-card"
                          template: declutter_system_graph
                          variables:
                            - sensor: sensor.memory_use_percent
                            - name: RAM
                            - server: Farnsworth
                            - title: RAM Utilization
                            - green: 70
                            - yellow: 80
                            - orange: 90
                            - red: 100
                        #----------------------------------------------------------------
                        ## HA CPU Temp Graph
                        #----------------------------------------------------------------
                        - type: "custom:decluttering-card"
                          template: declutter_system_graph
                          variables:
                            - sensor: sensor.processor_temperature
                            - name: CPU ºC
                            - server: Farnsworth
                            - title: CPU Temperature
                            - green: 50
                            - yellow: 65
                            - orange: 80
                            - red: 93
                    #----------------------------------------------------------------
                    ## HA Controls
                    #----------------------------------------------------------------
                    # TODO: #312 Format Dekstop + HA system control buttons.
                    - type: custom:hui-element
                      card_type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          name: RESTART
                          icon: "mdi:home-assistant"
                          tap_action:
                            action: call-service
                            service: homeassistant.restart
                            haptic: light
                          template: icon_name
                        - type: custom:button-card
                          name: DEV TOOLS
                          icon: "mdi:hammer"
                          tap_action:
                            action: navigate
                            navigation_path: "/developer-tools"
                            haptic: light
                          template: icon_name
                        - type: custom:button-card
                          name: RELOAD
                          icon: "mdi:reload-alert"
                          tap_action:
                            action: call-service
                            service: script.turn_on
                            service_data:
                              entity_id: script.ha_reload
                            haptic: light
                          double_tap_action:
                            action: call-service
                            service: script.turn_on
                            service_data:
                              entity_id: script.ha_refresh
                            haptic: medium
                          template: icon_name
          #################################################################
          ## TrueNAS Controls
          #################################################################
          Nibbler:
            type: "custom:mod-card"
            style: *mod_card_style
            card:
              type: grid
              columns: 1
              square: false
              cards:
                - type: vertical-stack
                  cards:
                    - type: entities
                      title: Nibbler
                      card_mod: &entities_bar_card_mod
                        style: |
                          ha-card {
                            border-style: none;
                            background: none;
                            --bar-card-border-radius: 8px;
                          }
                      entities:
                        - entity: update.truenas_system_update
                          name: Updates
                        - entity: binary_sensor.truenas_nibbler_healthy
                          name: NAS Health
                          icon: mdi:nas
                        - entity: sensor.truenas_uptime
                          name: Uptime
                        - type: custom:bar-card
                          width: 55%
                          height: 2.5em
                          decimal: 2
                          unit_of_measurement: "TiB"
                          positions: &bar_card_positions
                            icon: outside
                            indicator: "off"
                            name: outside
                            value: inside
                          max: 18.03
                          severity:
                            - color: "#303435"
                              from: 0
                              to: 13.52
                            - color: "#6d2525"
                              from: 13.52
                              to: 18.03
                          entity_row: true
                          style: &bar_card_style |
                            ha-card {
                              border-style: none;
                            }
                            bar-card-value {
                              font-size: 1em;
                              font-weight: 400;
                              color: #e0e1e1;
                              letter-spacing: 0.01em;
                              text-shadow: none;
                              margin-right: auto;
                              margin-left: auto;
                              margin-top: 5px;
                            }
                            bar-card-name {
                              padding-left: 0.25em;
                            }
                            bar-card-iconbar {
                              padding-left: 0.23em;
                            }
                            bar-card-backgroundbar {
                              background: none;
                            }
                            bar-card-currentbar {
                              border-radius: 0.3em;
                            }
                            bar-card-background {
                              background: radial-gradient(circle, rgba(52, 57, 58, 0.1) 0%, rgba(17, 18, 18, 0.2) 75%);
                              box-shadow: inset 0 0 25px #00000045;
                              border-radius: 0.3em;
                              overflow: hidden;
                            }
                          entities:
                            #----------------------------------------------------------------
                            ## Nibbler Memory Bar
                            #----------------------------------------------------------------
                            - entity: sensor.truenas_nibbler
                              name: Storage Used
                              icon: mdi:harddisk
                            # - entity: sensor.truenas_ram_free
                            #   name: Memory Free
                        #----------------------------------------------------------------
                        ## Nibbler CPU Utilization Graph
                        #----------------------------------------------------------------
                        - type: custom:hui-horizontal-stack-card
                          cards:
                            - type: "custom:decluttering-card"
                              template: declutter_system_graph
                              variables:
                                - sensor: sensor.truenas_cpu_usage
                                - name: CPU
                                - server: Nibbler
                                - title: CPU Utilization
                                - green: 25
                                - yellow: 50
                                - orange: 75
                                - red: 100
                            #----------------------------------------------------------------
                            ## Nibbler CPU Temp Graph
                            #----------------------------------------------------------------
                            - type: "custom:decluttering-card"
                              template: declutter_system_graph
                              variables:
                                - sensor: sensor.truenas_temperature
                                - name: CPU ºC
                                - server: Nibbler
                                - title: CPU Temperature
                                - green: 50
                                - yellow: 65
                                - orange: 70
                                - red: 75
                            #----------------------------------------------------------------
                            ## Nibbler Network Graph
                            #----------------------------------------------------------------
                            - type: "custom:decluttering-card"
                              template: declutter_network_graph
                              variables:
                                - sensor1: sensor.truenas_enp4s0_rx
                                - sensor2: sensor.truenas_enp4s0_tx
                                - name: Network
                                - server: Nibbler
                                - name1: Download
                                - name2: Upload
                                - data1: Down
                                - data2: Up

          #################################################################
          ## Leela Controls
          #################################################################
          Leela:
            type: "custom:mod-card"
            style: *mod_card_style
            card:
              type: grid
              columns: 1
              square: false
              cards:
                - type: entities
                  title: Leela
                  card_mod: *entities_bar_card_mod
                  entities:
                    - type: section
                      label: Plex
                      card_mod: &section_card_mod
                        style: |
                          :host {
                            display: flex !important;
                            flex-direction: row !important;
                            align-items: center !important;
                            gap: 8px !important;
                          }
                          .label {
                            color: var(--bc-text-dim) !important;
                            white-space: nowrap;
                            flex-shrink: 0;
                            margin: 0 !important;
                            order: -1 !important;
                          }
                          .divider {
                            flex: 1 !important;
                            background-color: var(--bc-text-dim) !important;
                            height: 1px !important;
                            margin: 0 !important;
                          }
                          hr {
                            display: none !important;
                          }
                    - entity: binary_sensor.leela_plex_updates
                      name: Plex Version
                      icon: mdi:plex
                      tap_action:
                        action: more-info
                        entity: update.plex_media_server_leela
                    - entity: sensor.leela_new_episode
                      name: New Episode
                      tap_action:
                        action: none
                    - type: section
                      label: System
                      card_mod: *section_card_mod
                    - type: custom:hui-horizontal-stack-card
                      cards:
                        #----------------------------------------------------------------
                        ## Leela CPU Utilization Graph
                        #----------------------------------------------------------------
                        - type: "custom:decluttering-card"
                          template: declutter_system_graph
                          variables:
                            - sensor: sensor.leela_cpu_used
                            - name: CPU
                            - server: Leela
                            - title: CPU Utilization
                            - green: 25
                            - yellow: 50
                            - orange: 75
                            - red: 100
                        #----------------------------------------------------------------
                        ## Leela Memory Utilization Graph
                        #----------------------------------------------------------------
                        - type: "custom:decluttering-card"
                          template: declutter_system_graph
                          variables:
                            - sensor: sensor.leela_ram_used
                            - name: RAM
                            - server: Leela
                            - title: RAM Utilization
                            - green: 25
                            - yellow: 50
                            - orange: 75
                            - red: 100
                        #----------------------------------------------------------------
                        ## Leela CPU Temp Graph
                        #----------------------------------------------------------------
                        - type: "custom:decluttering-card"
                          template: declutter_system_graph
                          variables:
                            - sensor: sensor.leela_package_temperature
                            - name: CPU ºC
                            - server: Leela
                            - title: CPU Temperature
                            - green: 50
                            - yellow: 65
                            - orange: 80
                            - red: 93
                    - type: section
                      label: Container Memory
                      card_mod: *section_card_mod
                    #----------------------------------------------------------------
                    ## Leela Container Memory Bars
                    #----------------------------------------------------------------
                    - type: custom:bar-card
                      width: 55%
                      height: 2em
                      decimal: 2
                      unit_of_measurement: "GiB"
                      positions: *bar_card_positions
                      max: 62.41
                      severity:
                        - color: "#303435"
                          from: 0
                          to: 46.81
                        - color: "#6d2525"
                          from: 46.81
                          to: 62.41
                      entity_row: true
                      style: *bar_card_style
                      card_mod:
                        style: |
                          #states > * {
                            margin-bottom: 2px !important;
                          }
                      entities:
                        - entity: sensor.plex_memory_usage
                          name: Plex
                          icon: mdi:plex
                        - entity: sensor.music_assistant_memory_usage
                          name: Music Asst.
                          icon: mdi:music
                        - entity: sensor.qbittorrent_memory_usage
                          name: qBittorrent
                          icon: mdi:download
                        - entity: sensor.sonarr_memory_usage
                          name: Sonarr
                          icon: mdi:television-play
                        - entity: sensor.radarr_memory_usage
                          name: Radarr
                          icon: mdi:movie-open
                    #----------------------------------------------------------------
                    ## Leela Controls
                    #----------------------------------------------------------------
                    # TODO: #312 Format Dekstop + HA system control buttons.
                    - type: custom:hui-element
                      card_type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          name: HEIMDALL
                          icon: "mdi:monitor-dashboard"
                          tap_action:
                            action: url
                            url_path: !secret heimdall
                            haptic: light
                          template: icon_name
                        - type: custom:button-card
                          name: UPTIME
                          icon: "mdi:lifebuoy"
                          tap_action:
                            action: url
                            url_path: !secret uptime
                            haptic: light
                          template: icon_name
                        - type: custom:button-card
                          name: STATS
                          icon: "mdi:abacus"
                          tap_action:
                            action: url
                            url_path: !secret stats
                            haptic: light
                          template: icon_name
          #################################################################
          ## Desktop Controls
          #################################################################
          Desktop:
            type: "custom:mod-card"
            style: *mod_card_style
            card:
              type: grid
              columns: 1
              square: false
              cards:
                - type: entities
                  title: Desktop PC
                  card_mod: *entities_card_mod
                  entities:
                    #----------------------------------------------------------------
                    ## PC CPU Utilization Graph
                    #----------------------------------------------------------------
                    - type: custom:hui-horizontal-stack-card
                      cards:
                        - type: "custom:decluttering-card"
                          template: declutter_system_graph
                          variables:
                            - sensor: sensor.pc_cpu_load
                            - name: CPU
                            - server: Zoidberg
                            - title: CPU Utilization
                            - green: 25
                            - yellow: 50
                            - orange: 75
                            - red: 100
                        #----------------------------------------------------------------
                        ## PC GPU Load Graph
                        #----------------------------------------------------------------
                        - type: "custom:decluttering-card"
                          template: declutter_system_graph
                          variables:
                            - sensor: sensor.pc_gpu_load
                            - name: GPU
                            - server: Zoidberg
                            - title: GPU Utilization
                            - green: 25
                            - yellow: 50
                            - orange: 75
                            - red: 100
                        #----------------------------------------------------------------
                        ## PC GPU Temp Graph
                        #----------------------------------------------------------------
                        - type: "custom:decluttering-card"
                          template: declutter_system_graph
                          variables:
                            - sensor: sensor.pc_gpu_temp
                            - name: GPU ºF
                            - server: Zoidberg
                            - title: GPU Temperature
                            - green: 140
                            - yellow: 158
                            - orange: 176
                            - red: 210
                    #----------------------------------------------------------------
                    ## PC Boot Button
                    #----------------------------------------------------------------
                    # TODO: #312 Format Dekstop + HA system control buttons.
                    - type: custom:hui-horizontal-stack-card
                      cards:
                        - type: custom:button-card
                          name: "WAKE"
                          icon: "mdi:monitor"
                          entity: script.pc_wake
                          tap_action:
                            action: toggle
                            haptic: light
                          template: icon_name
                        - type: custom:button-card
                          name: "SLEEP"
                          icon: "mdi:power-sleep"
                          entity: switch.pc_sleep
                          tap_action:
                            action: toggle
                            haptic: light
                          template: icon_name
                        - type: custom:button-card
                          name: "SHUTDWN"
                          icon: "mdi:power"
                          entity: script.pc_shutdown
                          tap_action:
                            action: toggle
                            haptic: light
                          template: icon_name
          #################################################################
          ## Claude Controls
          #################################################################
          Claude:
            type: "custom:mod-card"
            style: *mod_card_style
            card:
              type: grid
              columns: 1
              square: false
              cards:
                - type: entities
                  title: Claude Usage
                  card_mod: *entities_bar_card_mod
                  entities:
                    - entity: sensor.claude_session_reset_time
                      name: Session Reset
                    - entity: sensor.claude_weekly_reset_day
                      name: Week Reset
                    - type: custom:bar-card
                      width: 55%
                      height: 2.5em
                      decimal: 0
                      unit_of_measurement: "%"
                      positions: *bar_card_positions
                      max: 100
                      severity:
                        - color: "#303435"
                          from: 0
                          to: 75
                        - color: "#6d2525"
                          from: 75
                          to: 100
                      entity_row: true
                      style: *bar_card_style
                      entities:
                        - entity: sensor.claude_session_usage
                          name: Session Usage
                        - entity: sensor.claude_week_usage
                          name: Week Usage
