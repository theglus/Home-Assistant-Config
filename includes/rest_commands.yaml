set_volume:
  # /goform/formiPhoneAppDirect.xml?MV<volume> — IP hardcoded; !secret unsupported in Jinja2 URL templates
  url: 'http://192.168.86.187/goform/formiPhoneAppDirect.xml?MV{{states("input_number.denon_volume").replace(".", "") }}'
volume_up:
  # /goform/formiPhoneAppDirect.xml?MVUP
  url: !secret denon_volume_up_url
volume_down:
  # /goform/formiPhoneAppDirect.xml?MVDOWN
  url: !secret denon_volume_down_url
volume_correct:
  # /goform/formiPhoneAppDirect.xml?MV35
  url: !secret denon_volume_correct_url
