#################################################################
## Reload various Home Assistant services.
#################################################################
ha_reload:
  alias: "Reload"
  icon: mdi:reload-alert
  sequence:
    - service: shell_command.touch_lovelace
    - service: browser_mod.notification
      data:
        duration: 30000
        message: "🚀 Started reloading..."
        browser_id:
          - BrowserMod_Laptop
          - BrowserMod_Pixel
    - service: homeassistant.reload_all
    - service: browser_mod.notification
      data:
        duration: 3500
        message: "✅ HA config reloaded."
        browser_id:
          - BrowserMod_Laptop
          - BrowserMod_Pixel
    - service: lovelace.reload_resources
      data: {}
    - service: browser_mod.notification
      data:
        duration: 2000
        message: "✅ Lovelace resources reloaded."
        browser_id:
          - BrowserMod_Laptop
          - BrowserMod_Pixel
    - delay: "00:00:01"
    - service: browser_mod.notification
      data:
        duration: 3500
        message: "🏁 Reload complete."
        dismissable: true
        browser_id:
          - BrowserMod_Laptop
          - BrowserMod_Pixel
  mode: single
