#################################################################
## Wake PC + Toggle KVM switchbot.
#################################################################
pc_wake:
  alias: PC Wake
  sequence:
    - service: switch.turn_on
      data: {}
      target:
        entity_id: switch.switchbot_pc
    - action: button.press
      target:
        entity_id: button.wake_on_lan
  mode: single
  icon: mdi:monitor-dashboard
