#################################################################
## TrueNAS sensors.
#################################################################
- sensor:
    # TrueNAS Memory Used
    - name: "TrueNAS Memory Used"
      unique_id: 67994855-fb8f-4b62-b0ff-4c0e17b167fc
      unit_of_measurement: "GiB"
      state: "{{ state_attr('sensor.truenas_system_memory_usage', 'Memory used value') }}"
    # TrueNAS Memory Free
    - name: "TrueNAS Memory Free"
      unique_id: 98e6730b-df10-4abe-a226-734dbd08fb63
      unit_of_measurement: "GiB"
      state: "{{ state_attr('sensor.truenas_system_memory_usage', 'Memory free value') }}"
    # TrueNAS Upload
    - name: "TrueNAS Upload"
      unique_id: 38e48d20-f53b-496c-87a5-dd413f11ba70
      unit_of_measurement: "MiB"
      state: "{{ (states('sensor.truenas_enp4s0_tx') | float / 10024) | round(2) }}"
    # TrueNAS Download
    - name: "TrueNAS Download"
      unique_id: b3f26047-93e1-44a9-8d9a-3e3f786da98d
      unit_of_measurement: "MiB"
      state: "{{ (states('sensor.truenas_enp4s0_rx') | float / 10024) | round(2) }}"
