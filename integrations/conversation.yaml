#################################################################
## Conversations + Custom Sentences
#################################################################
conversation:
  intents:
    aqi:
      - "What's the AQI?"
      - "What's the AQI"
      - "What's the air quality?"
      - "What is the AQI?"
      - "What is the air quality?"
      - "How's the air quality?"
      - "How's the AQI?"
      - "How is the air quality?"
      - "How is the AQI?"
    muni_minutes:
      - "When is the next train downtown?"
      - "When is the next train to Chinatown?"
      - "When are the trains arriving?"
      - "What's the train schedule?"
      - "What is the train schedule?"
      - "What is the Muni schedule?"
      - "What's the Muni schedule?"
    welcome:
      - "Hello?"
      - "Hello"
      - "Hi?"
      - "Hi"

intent_script:
  aqi:
    speech:
      text: "The AQI in Dogpatch is {{states('sensor.aqi')}}."
  muni_minutes:
    speech:
      text: >-
        {%- set upcoming = state_attr('sensor.muni_metro_inbound', 'upcoming') -%}
        {%- set trains = upcoming.split(', ') if upcoming else [] -%}
        {%- if trains | length == 0 -%}No trains are currently scheduled to Chinatown.
        {%- elif trains | length == 1 -%}The next train to Chinatown arrives in {{ trains[0] }} minutes.
        {%- elif trains | length == 2 -%}The next 2 trains to Chinatown arrive in {{ trains[0] }} and {{ trains[1] }} minutes.
        {%- else -%}The next 3 trains to Chinatown arrive in {{ trains[0] }}, {{ trains[1] }}, and {{ trains[2] }} minutes.
        {%- endif -%}
  welcome:
    speech:
      text: "Hi I'm Farnsworth your home assistant. You can ask me things like 'what's the weather today,' 'what's playing,' and 'turn off the office lights.'"
